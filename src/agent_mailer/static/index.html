<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Agent Mailer - Operator Console</title>
<link rel="stylesheet" href="/static/styles.css?v=47">
</head>
<body>

<!-- Login / Register Page -->
<div class="login-page" id="loginPage">
  <div class="login-lang-switcher">
    <div class="lang-switcher" role="group" aria-label="Language" data-i18n-aria-label="header.language">
      <button type="button" class="lang-btn" data-lang="zh-CN" data-i18n="header.langZh">中文</button>
      <button type="button" class="lang-btn" data-lang="en-US" data-i18n="header.langEn">EN</button>
    </div>
  </div>
  <a href="/" class="login-home-link" data-i18n="login.backHome">&larr; Back to Home</a>
  <div class="login-box">
    <h2 data-i18n="login.title">Agent Mailer</h2>
    <p class="login-subtitle" id="loginSubtitle" data-i18n="login.subtitleSignIn">Operator Console — Sign in to continue</p>

    <!-- Login form -->
    <div id="loginFormWrap">
      <div class="login-form" id="loginForm">
        <div>
          <label for="loginUsername" data-i18n="login.username">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" autocomplete="username" data-i18n-placeholder="login.usernamePlaceholder">
        </div>
        <div>
          <label for="loginPassword" data-i18n="login.password">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" data-i18n-placeholder="login.passwordPlaceholder">
        </div>
        <div id="loginError" class="login-error" style="display:none"></div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()" data-i18n="login.signIn">Sign In</button>
      </div>
      <div class="login-toggle">
        <span data-i18n="login.haveInvite">Have an invite code?</span> <a onclick="showRegisterForm()" data-i18n="login.register">Register</a>
      </div>
    </div>

    <!-- Register form -->
    <div id="registerFormWrap" style="display:none">
      <div class="login-form" id="registerForm">
        <div>
          <label for="regUsername" data-i18n="login.username">Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="username" data-i18n-placeholder="login.regUsernamePlaceholder">
        </div>
        <div>
          <label for="regPassword" data-i18n="login.password">Password</label>
          <input type="password" id="regPassword" placeholder="Choose a password" autocomplete="new-password" data-i18n-placeholder="login.regPasswordPlaceholder">
        </div>
        <div id="regInviteCodeWrap">
          <label for="regInviteCode" data-i18n="login.inviteCode">Invite Code</label>
          <input type="text" id="regInviteCode" placeholder="Enter invite code" data-i18n-placeholder="login.inviteCodePlaceholder">
        </div>
        <div id="registerError" class="login-error" style="display:none"></div>
        <button class="login-btn" id="registerBtn" onclick="doRegister()" data-i18n="login.createAccount">Create Account</button>
      </div>
      <div class="login-toggle">
        <span data-i18n="login.alreadyHave">Already have an account?</span> <a onclick="showLoginForm()" data-i18n="login.signInLink">Sign in</a>
      </div>
    </div>
  </div>
</div>

<!-- Impersonation banner -->
<div class="impersonate-banner" id="impersonateBanner" style="display:none">
  <span id="impersonateLabel"></span>
  <button onclick="exitImpersonation()" data-i18n="header.exitImpersonation">Exit impersonation</button>
</div>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar" data-i18n-aria-label="header.toggleSidebar">&#9776;</button>
    <a href="/" style="text-decoration:none"><h1>AMP<span class="accent">/</span>CONSOLE</h1></a>
  </div>
  <div class="header-right">
    <span class="poll-status" id="pollIndicator" title="Auto-refresh active" data-i18n-title="header.pollActive"></span>
    <label><span data-i18n="header.refresh">Refresh:</span>
      <select id="pollSelect">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
        <option value="0" data-i18n="header.pollOff">Off</option>
      </select>
    </label>
    <span class="header-user" id="headerUsername"></span>
    <div class="lang-switcher" role="group" aria-label="Language" data-i18n-aria-label="header.language">
      <button type="button" class="lang-btn" data-lang="zh-CN" data-i18n="header.langZh">中文</button>
      <button type="button" class="lang-btn" data-lang="en-US" data-i18n="header.langEn">EN</button>
    </div>
    <button class="header-logout-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle theme" data-i18n-title="header.themeToggle" style="display:flex;align-items:center;padding:4px 8px;"></button>
    <button class="header-logout-btn" id="logoutBtn" onclick="doLogout()" data-i18n="header.logout">Logout</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-toolbar" id="sidebarToolbar">
      <label for="sidebarModeSelect" id="sidebarModeLabel" data-i18n="sidebar.label">Sidebar</label>
      <select id="sidebarModeSelect" title="List by agents or threads" data-i18n-title="sidebar.listMode">
        <option value="agents" selected data-i18n="sidebar.byAgents">By Agents</option>
        <option value="teams" data-i18n="sidebar.byTeams">By Teams</option>
      </select>
    </div>
    <div class="sidebar-filter-row" id="filterRow">
      <button class="sidebar-filter-btn" id="filterToggleBtn" onclick="openFilterModal()">
        <span class="filter-icon">&#9881;</span> <span data-i18n="sidebar.filter">Tag filter</span>
      </button>
    </div>
<div class="modal-overlay" id="filterModal" onclick="if(event.target===this)closeFilterModal()">
  <div class="filter-modal-box">
    <div class="filter-modal-title" data-i18n="filter.title">Tag filter</div>
    <div class="filter-modal-tags" id="filterModalTags"></div>
    <div class="filter-modal-actions">
      <button class="modal-cancel" onclick="clearFilterTags()" data-i18n="filter.clearAll">Clear all</button>
      <button class="btn btn-primary" onclick="closeFilterModal()" data-i18n="filter.ok">OK</button>
    </div>
  </div>
</div>
    <div class="agent-list" id="agentList"></div>
  </div>
  <div class="main" id="main">
    <div class="empty" data-i18n="empty.selectAgent">Select an agent to view inbox, or click Inbox/Compose / Stats.</div>
  </div>
</div>
<div class="nav-buttons" id="navButtons">
  <button class="nav-toggle" id="navToggle" onclick="toggleNavPanel()" title="Toggle panel" data-i18n-title="nav.togglePanel">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </button>

  <button class="nav-btn" id="navSearch" onclick="showSearch()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span data-i18n="nav.search">Search</span></button>
  <button class="nav-btn" id="navCompose" onclick="showCompose()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span data-i18n="nav.compose">Compose</span></button>
  <button class="nav-btn" id="navStats" onclick="showStats()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span data-i18n="nav.stats">Stats</span></button>
  <button class="nav-btn" id="navTeams" onclick="showTeams()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span data-i18n="nav.teams">Teams</span></button>
  <button class="nav-btn" id="navThreads" onclick="showThreads()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span data-i18n="nav.threads">Threads</span></button>
  <button class="nav-btn" id="navArchive" onclick="showArchive()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg><span data-i18n="nav.archive">Archive</span></button>
  <button class="nav-btn" id="navTrash" onclick="showTrash()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg><span data-i18n="nav.trash">Trash</span></button>
  <button class="nav-btn" id="navApiKeys" onclick="showApiKeys()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg><span data-i18n="nav.apiKeys">API Keys</span></button>
  <button class="nav-btn" id="navAdmin" onclick="showAdmin()" style="display:none"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span data-i18n="nav.admin">Admin</span></button>

</div>

<div class="modal-overlay" id="composeModal">
  <div class="compose-modal-box">
    <button class="compose-modal-close" onclick="closeComposeModal()">&times;</button>
    <div id="composeModalContent"></div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-title" id="confirmTitle"></div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="confirmCancel" data-i18n="common.cancel">Cancel</button>
      <button class="modal-confirm" id="confirmOk" data-i18n="common.confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
const BASE = '';
let HUMAN_OPERATOR_ADDRESS = '';
let HUMAN_OPERATOR_AGENT_ID = '';
function humanSubjectClass(fromAgent) {
  return HUMAN_OPERATOR_ADDRESS && fromAgent === HUMAN_OPERATOR_ADDRESS ? ' msg-subject-human' : '';
}
let agents = [];
let statsData = [];
let threadsData = [];
let trashedMessagesData = [];
let sidebarMode = 'agents';
let currentView = null;
let expandedMsg = null;
let pollTimer = null;
let pollInterval = 5000;
let msgCache = {};
let tagEditingActive = false;
let acIndex = -1;
let filterTags = new Set();
let currentUser = null;
</script>
<script src="/static/js/i18n.js?v=4"></script>
<script src="/static/js/theme.js?v=39"></script>
<script src="/static/js/helpers.js?v=46"></script>
<script src="/static/js/api.js?v=45"></script>
<script src="/static/js/auth.js?v=39"></script>
<script src="/static/js/sidebar.js?v=38"></script>
<script src="/static/js/views.js?v=48"></script>
<script src="/static/js/teams.js?v=47"></script>
<script src="/static/js/tags.js?v=38"></script>
<script src="/static/js/events.js?v=42"></script>
</body>
</html>
