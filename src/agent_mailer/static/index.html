<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Mailer - Operator Console</title>
<style>
:root {
  --bg: #f5f5f5;
  --sidebar-bg: #1e1e2e;
  --sidebar-text: #cdd6f4;
  --msg-subject-human: #1e40af;
  --sidebar-hover: #313244;
  --sidebar-active: #45475a;
  --card-bg: #fff;
  --border: #e0e0e0;
  --primary: #7c3aed;
  --primary-light: #ede9fe;
  --danger: #ef4444;
  --success: #22c55e;
  --muted: #6b7280;
  --text: #1f2937;
  --badge-bg: #ef4444;
  --badge-text: #fff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { background: var(--sidebar-bg); color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 18px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.header-right label { color: var(--sidebar-text); }
.header-right select { background: var(--sidebar-hover); color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 6px; font-size: 12px; }
.poll-status { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }
.poll-status.paused { background: var(--muted); }

/* Layout */
.layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 280px; min-width: 240px; max-width: min(380px, 40vw); background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-section { padding: 12px 16px 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.sidebar-toolbar { padding: 8px 12px 4px; display: flex; flex-direction: column; gap: 6px; }
.sidebar-toolbar label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
#sidebarModeSelect { width: 100%; background: var(--sidebar-hover); color: var(--sidebar-text); border: 1px solid #45475a; border-radius: 6px; padding: 6px 8px; font-size: 12px; cursor: pointer; }
#sidebarModeSelect:focus { outline: 1px solid var(--primary); outline-offset: 1px; }
.agent-list { flex: 1; overflow-y: auto; padding-bottom: 180px; }
.agent-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-left: 3px solid transparent; transition: background 0.15s; }
.agent-item:hover { background: var(--sidebar-hover); }
.agent-item.active { background: var(--sidebar-active); border-left-color: var(--primary); }
.agent-item .agent-info { overflow: hidden; }
.agent-item .agent-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-item .agent-role { font-size: 11px; color: var(--muted); }
/* By Threads: show full first-message subject (multi-line), badge top-aligned */
.agent-item.thread-sidebar-item { align-items: flex-start; gap: 10px; }
.agent-item.thread-sidebar-item .agent-info { overflow: visible; flex: 1; min-width: 0; }
.agent-item.thread-sidebar-item .agent-name {
  white-space: normal;
  word-break: break-word;
  overflow: visible;
  text-overflow: unset;
  line-height: 1.35;
  font-size: 13px;
}
.agent-item.thread-sidebar-item .badge { flex-shrink: 0; margin-top: 2px; }
.badge { background: var(--badge-bg); color: var(--badge-text); font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
.badge.zero { background: var(--muted); opacity: 0.5; }

.trash-split-title {
  padding: 10px 16px 4px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  border-top: 1px solid #313244;
}
.trash-split-title:first-child { border-top: none; padding-top: 6px; }

.nav-buttons { position: fixed; bottom: 0; left: 0; width: 280px; padding: 12px; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid #333; background: var(--sidebar-bg); z-index: 10; }
.nav-btn { padding: 10px 16px; background: none; border: none; color: var(--sidebar-text); cursor: pointer; text-align: left; font-size: 14px; border-radius: 6px; transition: background 0.15s; }
.nav-btn:hover { background: var(--sidebar-hover); }
.nav-btn.active { background: var(--primary); color: #fff; }

/* Main */
.main { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 16px; margin-bottom: 12px; }

/* Inbox */
.msg-list { list-style: none; }
.msg-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: default; transition: background 0.1s; }
.msg-item:hover { background: #f9fafb; }
.msg-item-head { cursor: pointer; }
.msg-item:last-child { border-bottom: none; }
.msg-item.unread { border-left: 3px solid var(--primary); }
.msg-item.read { border-left: 3px solid transparent; opacity: 0.7; }
.msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.msg-from { font-weight: 600; font-size: 13px; }
.msg-time { font-size: 11px; color: var(--muted); }
.msg-subject { font-size: 14px; margin-bottom: 2px; }
.msg-subject.msg-subject-human { color: var(--msg-subject-human); font-weight: 600; }
.msg-detail-subject { font-size: 15px; font-weight: 500; margin-bottom: 10px; line-height: 1.4; }
.msg-detail-subject.msg-subject-human { color: var(--msg-subject-human); font-weight: 600; }
.thread-subject-line { font-weight: 500; margin: 4px 0 6px; font-size: 14px; line-height: 1.4; }
.thread-subject-line.msg-subject-human { color: var(--msg-subject-human); font-weight: 600; }
.msg-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-action-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; text-transform: uppercase; }
.msg-action-tag.send { background: #dbeafe; color: #1d4ed8; }
.msg-action-tag.reply { background: #dcfce7; color: #166534; }
.msg-action-tag.forward { background: #fef3c7; color: #92400e; }

/* Message detail */
.msg-detail { background: #f9fafb; border-radius: 6px; padding: 16px; margin-top: 8px; cursor: auto; user-select: text; }
.msg-detail .msg-body { margin: 12px 0; }
.msg-detail .meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.thread-link { font-size: 12px; color: var(--primary); cursor: pointer; text-decoration: underline; }

/* Markdown body (server-rendered body_html) */
.markdown-body { font-size: 14px; line-height: 1.65; color: var(--text); word-wrap: break-word; cursor: auto; user-select: text; }
.markdown-body > :first-child { margin-top: 0; }
.markdown-body > :last-child { margin-bottom: 0; }
.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { margin: 0.75em 0 0.35em; font-weight: 600; line-height: 1.3; }
.markdown-body h1 { font-size: 1.35em; }
.markdown-body h2 { font-size: 1.2em; }
.markdown-body h3 { font-size: 1.05em; }
.markdown-body p { margin: 0.5em 0; }
.markdown-body ul, .markdown-body ol { margin: 0.5em 0; padding-left: 1.5em; }
.markdown-body li { margin: 0.2em 0; }
.markdown-body blockquote { margin: 0.5em 0; padding: 0.35em 0 0.35em 1em; border-left: 3px solid #c4b5fd; color: #4b5563; background: #fafafa; border-radius: 0 4px 4px 0; }
.markdown-body pre { margin: 0.75em 0; padding: 12px 14px; background: #1e1e2e; color: #e5e7eb; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
.markdown-body code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.9em; }
.markdown-body :not(pre) > code { background: #f3f4f6; padding: 0.15em 0.4em; border-radius: 4px; }
.markdown-body pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
.markdown-body table { border-collapse: collapse; width: 100%; margin: 0.75em 0; font-size: 13px; }
.markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; vertical-align: top; }
.markdown-body th { background: #f3f4f6; font-weight: 600; }
.markdown-body a { color: #2563eb; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body img { max-width: 100%; height: auto; border-radius: 4px; }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
.markdown-body .codehilite, .markdown-body .highlight { margin: 0.75em 0; }
.markdown-body .codehilite pre, .markdown-body .highlight pre { margin: 0; }

/* Thread view */
.thread-msg { border-left: 3px solid var(--border); padding: 12px 16px; margin-bottom: 8px; }
.thread-msg .thread-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.thread-msg .thread-body { margin-top: 6px; }

.compose-original-md { background: #f3f4f6; border-left: 3px solid var(--primary); padding: 12px 16px; border-radius: 4px; max-height: 320px; overflow-y: auto; font-size: 13px; }

/* Compose */
.compose-form { display: flex; flex-direction: column; gap: 12px; }
.compose-form label { font-size: 13px; font-weight: 600; }
.compose-form select,
.compose-form input:not([type="radio"]):not([type="checkbox"]),
.compose-form textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; }
.compose-form input[type="radio"],
.compose-form input[type="checkbox"] { width: auto; flex-shrink: 0; margin: 0; accent-color: var(--primary); }
.compose-form label.compose-radio-row { display: flex; align-items: flex-start; gap: 10px; font-weight: normal; cursor: pointer; margin-bottom: 8px; }
.compose-form label.compose-radio-row:last-of-type { margin-bottom: 0; }
.compose-form .compose-forward-hint { font-size: 12px; color: var(--muted); margin: 0 0 10px; line-height: 1.4; }
.compose-form .compose-forward-scope > label:first-of-type { display: block; }
.compose-form textarea { min-height: 200px; resize: vertical; }
.btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #6d28d9; }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
.btn-secondary { background: #475569; color: #fff; }
.btn-secondary:hover { background: #334155; }
.thread-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
.compose-status { font-size: 13px; padding: 8px; border-radius: 4px; }
.compose-status.success { background: #dcfce7; color: #166534; }
.compose-status.error { background: #fee2e2; color: #991b1b; }

/* Stats */
.stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.stats-table th { text-align: left; padding: 8px 12px; background: #f3f4f6; border-bottom: 2px solid var(--border); font-weight: 600; }
.stats-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.stats-table tr:hover td { background: #f9fafb; }
.stat-num { font-variant-numeric: tabular-nums; text-align: right; }

/* Back button */
.back-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 13px; margin-bottom: 12px; padding: 0; }
.back-btn:hover { text-decoration: underline; }

/* Empty state */
.empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

/* Tag editor */
.tag-editor { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 8px 0; margin-bottom: 8px; }
.tag-pill { display: inline-flex; align-items: center; gap: 4px; background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 500; padding: 3px 8px 3px 10px; border-radius: 12px; white-space: nowrap; }
.tag-pill .tag-remove { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; border-radius: 50%; opacity: 0.6; transition: opacity 0.15s; }
.tag-pill .tag-remove:hover { opacity: 1; }
.tag-input { border: 1px dashed var(--border); border-radius: 12px; padding: 3px 10px; font-size: 12px; font-family: inherit; outline: none; min-width: 80px; width: 100px; background: transparent; color: var(--text); }
.tag-input:focus { border-color: var(--primary); border-style: solid; }
.tag-input::placeholder { color: var(--muted); }
/* Sidebar mini tags */
.sidebar-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.sidebar-tag { font-size: 10px; background: rgba(124,58,237,0.15); color: #a78bfa; padding: 1px 6px; border-radius: 8px; white-space: nowrap; }

/* Agent delete button */
.agent-delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 4px; opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; line-height: 1; }
.agent-item:hover .agent-delete-btn { opacity: 1; }
.agent-delete-btn:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

/* Confirm modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.visible { display: flex; }
.modal-box { background: #fff; border-radius: 12px; padding: 28px 24px 20px; max-width: 380px; width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.25); animation: modalIn 0.18s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(0.92) translateY(8px); } to { opacity: 1; transform: none; } }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.modal-body { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
.modal-cancel { padding: 8px 18px; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--text); cursor: pointer; font-size: 14px; font-weight: 500; }
.modal-cancel:hover { background: #f3f4f6; }
.modal-confirm { padding: 8px 18px; border: none; border-radius: 6px; background: var(--danger); color: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
.modal-confirm:hover { background: #dc2626; }

/* Hamburger button (hidden on desktop) */
.hamburger { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 4px 8px; line-height: 1; }

/* Sidebar overlay backdrop (mobile only) */
.sidebar-backdrop { display: none; }

/* ===== Mobile ===== */
@media (max-width: 768px) {
  .hamburger { display: block; }
  .layout { position: relative; }
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 85vw; max-width: 340px;
    height: 100vh; height: 100dvh;
    z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 199;
  }
  .sidebar-backdrop.visible { display: block; }
  .main { padding: 16px 12px; }
  .header { padding: 10px 14px; }
  .header h1 { font-size: 15px; }
  .nav-buttons {
    width: auto; right: 0;
    flex-direction: row;
    justify-content: space-around;
    padding: 0;
    z-index: 100;
    gap: 0;
  }
  .nav-btn { flex: 1; text-align: center; font-size: 12px; padding: 12px 4px; border-radius: 0; }
  .main { padding-bottom: 64px; }
  .agent-list { padding-bottom: 0; }
  .agent-delete-btn { opacity: 0.6; font-size: 20px; padding: 6px 10px; }
  .msg-item { padding: 14px 12px; }
  .msg-header { flex-wrap: wrap; gap: 4px; }
  .msg-from { font-size: 14px; }
  .msg-time { font-size: 12px; }
  .msg-subject { font-size: 15px; }
  .msg-preview { font-size: 13px; }
  .thread-msg { padding: 12px; }
  .thread-actions { gap: 8px; }
  .thread-actions .btn { font-size: 13px; padding: 8px 14px; }
  .stats-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .stats-table { min-width: 600px; }
  .stats-table th, .stats-table td { padding: 8px 8px; font-size: 12px; white-space: nowrap; }
  .card { padding: 16px 12px; }
  .compose-form textarea { min-height: 150px; }
  .compose-form select,
  .compose-form input:not([type="radio"]):not([type="checkbox"]),
  .compose-form textarea { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">&#9776;</button>
    <h1>Agent Mailer &mdash; Operator Console</h1>
  </div>
  <div class="header-right">
    <span class="poll-status" id="pollIndicator" title="Auto-refresh active"></span>
    <label>Refresh:
      <select id="pollSelect">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
        <option value="0">Off</option>
      </select>
    </label>
  </div>
</div>

<div class="layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-toolbar" id="sidebarToolbar">
      <label for="sidebarModeSelect" id="sidebarModeLabel">Sidebar</label>
      <select id="sidebarModeSelect" title="List by agents or threads">
        <option value="agents" selected>By Agents</option>
        <option value="threads">By Threads</option>
      </select>
    </div>
    <div class="agent-list" id="agentList"></div>
  </div>
  <div class="main" id="main">
    <div class="empty">Select an agent to view inbox, or click Inbox/Compose / Stats.</div>
  </div>
</div>
<div class="nav-buttons" id="navButtons">
  <button class="nav-btn" id="navCompose" onclick="showCompose()">Inbox/Compose</button>
  <button class="nav-btn" id="navStats" onclick="showStats()">Stats</button>
  <button class="nav-btn" id="navArchive" onclick="showArchive()">Archive</button>
  <button class="nav-btn" id="navTrash" onclick="showTrash()">Trash</button>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-title" id="confirmTitle"></div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="confirmCancel">取消</button>
      <button class="modal-confirm" id="confirmOk">确认</button>
    </div>
  </div>
</div>

<script>
const BASE = '';
/** Matches server HUMAN_OPERATOR_ADDRESS (admin compose sender). */
const HUMAN_OPERATOR_ADDRESS = 'human-operator@local';
function humanSubjectClass(fromAgent) {
  return fromAgent === HUMAN_OPERATOR_ADDRESS ? ' msg-subject-human' : '';
}
let agents = [];
let statsData = [];
let threadsData = [];
let trashedMessagesData = [];
let sidebarMode = 'agents'; // 'agents' | 'threads'
let currentView = null; // ... | {type:'archive'|'trash'|'trashedMessage'} | {type:'thread', ...}
let expandedMsg = null;
let pollTimer = null;
let pollInterval = 5000;
let msgCache = {}; // id -> message object
let tagEditingActive = false;

// --- API helpers ---
async function api(path, opts) {
  const resp = await fetch(BASE + path, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || resp.statusText);
  }
  return resp.json();
}

// --- Data fetching ---
async function fetchStats() {
  statsData = await api('/admin/agents/stats');
  return statsData;
}

async function fetchAgents() {
  agents = await api('/agents');
  return agents;
}

async function fetchInbox(address) {
  return api(`/admin/messages/inbox/${encodeURIComponent(address)}?all=true`);
}

async function fetchThread(threadId) {
  return api(`/messages/thread/${encodeURIComponent(threadId)}`);
}

async function fetchThreadsSummary(opts = {}) {
  const { archived = false, trashed = false } = opts;
  let q = '';
  if (trashed) q = '?trashed=true';
  else if (archived) q = '?archived=true';
  threadsData = await api('/admin/threads/summary' + q);
  return threadsData;
}

async function fetchTrashedMessages() {
  trashedMessagesData = await api('/admin/trash/messages');
  return trashedMessagesData;
}

/** @param {'none'|'archive'|'trash'} mode */
function setSidebarSpecialMode(mode) {
  const sel = document.getElementById('sidebarModeSelect');
  const lab = document.getElementById('sidebarModeLabel');
  if (!sel || !lab) return;
  if (mode === 'none') {
    sel.disabled = false;
    lab.textContent = 'Sidebar';
  } else {
    sel.disabled = true;
    lab.textContent = mode === 'archive' ? 'Archive' : 'Trash';
  }
}

// --- Sidebar ---
async function refreshSidebar() {
  const list = document.getElementById('agentList');
  const inTrashContext =
    currentView?.type === 'trash' ||
    currentView?.type === 'trashedMessage' ||
    (currentView?.type === 'thread' && currentView.fromTrash);
  const inArchiveContext =
    currentView?.type === 'archive' ||
    (currentView?.type === 'thread' && currentView.fromArchive);

  if (inTrashContext) {
    await fetchThreadsSummary({ trashed: true });
    await fetchTrashedMessages();
    const activeTid = currentView?.type === 'thread' ? currentView.threadId : null;
    const activeMid = currentView?.type === 'trashedMessage' ? currentView.messageId : null;
    if (threadsData.length === 0 && trashedMessagesData.length === 0) {
      list.innerHTML = '<div class="empty" style="padding:20px 16px;font-size:12px">Trash is empty.</div>';
      return;
    }
    const threadsBlock = threadsData.length === 0
      ? '<div class="empty" style="padding:8px 16px 12px;font-size:12px">No threads in trash.</div>'
      : threadsData.map(t => `
    <div class="agent-item thread-sidebar-item ${t.thread_id === activeTid ? 'active' : ''}"
         data-thread-id="${t.thread_id}"
         onclick="showThreadFromSidebar(this.dataset.threadId, 'trash')">
      <div class="agent-info">
        <div class="agent-name">${esc(t.preview_subject) || '(no subject)'}</div>
        <div class="agent-role">${esc(t.thread_id.substring(0, 8))}&hellip; &middot; ${t.message_count} msg</div>
      </div>
      <span class="badge ${t.unread_count === 0 ? 'zero' : ''}">${t.unread_count}</span>
    </div>
  `).join('');
    const msgsBlock = trashedMessagesData.length === 0
      ? '<div class="empty" style="padding:8px 16px 12px;font-size:12px">No individual messages in trash.</div>'
      : trashedMessagesData.map(tm => `
    <div class="agent-item thread-sidebar-item trash-msg-item ${tm.message_id === activeMid ? 'active' : ''}"
         data-message-id="${tm.message_id}"
         onclick="showTrashedMessageFromTrash(this.dataset.messageId)">
      <div class="agent-info">
        <div class="agent-name">${esc(tm.subject) || '(no subject)'}</div>
        <div class="agent-role">${esc(tm.from_agent)} &middot; ${esc(tm.thread_id.substring(0, 8))}&hellip;</div>
      </div>
    </div>
  `).join('');
    list.innerHTML =
      '<div class="trash-split-title">Threads deleted</div>' +
      threadsBlock +
      '<div class="trash-split-title">Messages deleted</div>' +
      msgsBlock;
    return;
  }

  if (inArchiveContext) {
    await fetchThreadsSummary({ archived: true });
    const activeTid = currentView?.type === 'thread' ? currentView.threadId : null;
    list.innerHTML = threadsData.length === 0
      ? '<div class="empty" style="padding:20px 16px;font-size:12px">No archived threads.</div>'
      : threadsData.map(t => `
    <div class="agent-item thread-sidebar-item ${t.thread_id === activeTid ? 'active' : ''}"
         data-thread-id="${t.thread_id}"
         onclick="showThreadFromSidebar(this.dataset.threadId, 'archive')">
      <div class="agent-info">
        <div class="agent-name">${esc(t.preview_subject) || '(no subject)'}</div>
        <div class="agent-role">${esc(t.thread_id.substring(0, 8))}&hellip; &middot; ${t.message_count} msg</div>
      </div>
      <span class="badge ${t.unread_count === 0 ? 'zero' : ''}">${t.unread_count}</span>
    </div>
  `).join('');
    return;
  }

  if (sidebarMode === 'threads') {
    await fetchThreadsSummary({});
    const activeTid = currentView?.type === 'thread' ? currentView.threadId : null;
    list.innerHTML = threadsData.length === 0
      ? '<div class="empty" style="padding:20px 16px;font-size:12px">No threads yet.</div>'
      : threadsData.map(t => `
    <div class="agent-item thread-sidebar-item ${t.thread_id === activeTid ? 'active' : ''}"
         data-thread-id="${t.thread_id}"
         onclick="showThreadFromSidebar(this.dataset.threadId, null)">
      <div class="agent-info">
        <div class="agent-name">${esc(t.preview_subject) || '(no subject)'}</div>
        <div class="agent-role">${esc(t.thread_id.substring(0, 8))}&hellip; &middot; ${t.message_count} msg</div>
      </div>
      <span class="badge ${t.unread_count === 0 ? 'zero' : ''}">${t.unread_count}</span>
    </div>
  `).join('');
    return;
  }

  await fetchStats();
  const activeAddr = currentView?.type === 'inbox' ? currentView.address : null;
  list.innerHTML = statsData.map(a => {
    const tagsHtml = (a.tags || []).length > 0
      ? `<div class="sidebar-tags">${a.tags.map(t => `<span class="sidebar-tag">${esc(t)}</span>`).join('')}</div>`
      : '';
    return `
    <div class="agent-item ${a.address === activeAddr ? 'active' : ''}"
         onclick='showInbox(${JSON.stringify(a.address)}, ${JSON.stringify(a.agent_id)})'>
      <div class="agent-info">
        <div class="agent-name">${esc(a.name)}</div>
        <div class="agent-role">${esc(a.role)} &middot; ${esc(a.address)}</div>
        ${tagsHtml}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="badge ${a.messages_unread === 0 ? 'zero' : ''}">${a.messages_unread}</span>
        <button class="agent-delete-btn" onclick="event.stopPropagation(); deleteAgent('${esc(a.agent_id)}', '${esc(a.name)}')" title="Delete agent">&times;</button>
      </div>
    </div>`;
  }).join('');
}

// --- Views ---
function clearNav() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.agent-item').forEach(b => b.classList.remove('active'));
  expandedMsg = null;
}

async function showArchive() {
  clearNav();
  document.getElementById('navArchive').classList.add('active');
  setSidebarSpecialMode('archive');
  currentView = { type: 'archive' };
  document.getElementById('main').innerHTML =
    '<div class="empty">Select an archived thread from the sidebar.</div>';
  await refreshSidebar();
}

async function showTrash() {
  clearNav();
  document.getElementById('navTrash').classList.add('active');
  setSidebarSpecialMode('trash');
  currentView = { type: 'trash' };
  document.getElementById('main').innerHTML =
    '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
  await refreshSidebar();
}

async function showTrashedMessageFromTrash(messageId) {
  clearNav();
  document.getElementById('navTrash').classList.add('active');
  setSidebarSpecialMode('trash');
  currentView = { type: 'trashedMessage', messageId };
  await refreshSidebar();
  await renderTrashedMessageView();
}

async function renderTrashedMessageView() {
  if (currentView?.type !== 'trashedMessage') return;
  const mid = currentView.messageId;
  const main = document.getElementById('main');
  let data;
  try {
    data = await api(`/admin/trash/messages/${encodeURIComponent(mid)}`);
  } catch (e) {
    main.innerHTML = `
      <div class="card">
        <p class="empty">This message is no longer in trash.</p>
        <button type="button" class="back-btn" id="tmGoneBack">\u2190 Back to Trash</button>
      </div>`;
    document.getElementById('tmGoneBack').onclick = () => {
      currentView = { type: 'trash' };
      main.innerHTML =
        '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
      void refreshSidebar();
    };
    return;
  }
  const m = data.message;
  main.innerHTML = `
    <button type="button" class="back-btn" id="tmBackBtn">\u2190 Back to Trash</button>
    <div class="card">
      <h2>Message in trash</h2>
      <p class="meta">Trashed at: ${esc(fmtTime(data.trashed_at))}</p>
      <div class="thread-msg">
        <div class="thread-meta">
          <strong>${esc(m.from_agent)}</strong> &rarr; ${esc(m.to_agent)}
          <span class="msg-action-tag ${m.action}" style="margin-left:6px">${m.action}</span>
          <span style="margin-left:8px;color:var(--muted)">${esc(fmtTime(m.created_at))}</span>
        </div>
        ${m.subject ? `<div class="thread-subject-line${humanSubjectClass(m.from_agent)}">${esc(m.subject)}</div>` : ''}
        <div class="thread-body markdown-body" data-md-html="${mdDataAttr(m.body_html)}"></div>
      </div>
      <div class="thread-actions" style="margin-top:12px">
        <button type="button" class="btn btn-secondary" id="tmRestoreBtn">Restore</button>
        <button type="button" class="btn btn-secondary" id="tmPurgeBtn" style="background:var(--danger)">Delete permanently</button>
      </div>
    </div>`;
  hydrateMarkdownBodies(main);
  document.getElementById('tmBackBtn').onclick = () => {
    currentView = { type: 'trash' };
    main.innerHTML =
      '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
    void refreshSidebar();
  };
  document.getElementById('tmRestoreBtn').onclick = async () => {
    try {
      await api(`/admin/messages/${encodeURIComponent(mid)}/restore`, { method: 'POST' });
      currentView = { type: 'trash' };
      main.innerHTML =
        '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
      await refreshSidebar();
    } catch (e) {
      alert(e.message);
    }
  };
  document.getElementById('tmPurgeBtn').onclick = async () => {
    if (!await showConfirm('永久删除消息', '确定要永久删除这条消息吗？此操作不可撤销。', '删除')) return;
    try {
      await api(`/admin/messages/${encodeURIComponent(mid)}/purge`, { method: 'POST' });
      currentView = { type: 'trash' };
      main.innerHTML =
        '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
      await refreshSidebar();
    } catch (e) {
      alert(e.message);
    }
  };
}

async function trashSingleMessage(messageId, opts = {}) {
  try {
    await api(`/admin/messages/${encodeURIComponent(messageId)}/trash`, { method: 'POST' });
    if (opts.fromInbox && expandedMsg === messageId) expandedMsg = null;
    if (currentView?.type === 'trashedMessage') {
      currentView = { type: 'trash' };
      document.getElementById('main').innerHTML =
        '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
    }
    await refreshSidebar();
    if (opts.fromThread) await renderThreadView();
    else if (currentView?.type === 'inbox') await renderInbox();
  } catch (e) {
    alert(e.message);
  }
}

async function showInbox(address, agentId) {
  clearNav();
  setSidebarSpecialMode('none');
  currentView = { type: 'inbox', address, agentId: agentId || null };
  await refreshSidebar();
  await renderInbox();
}

function renderTagEditor(agentId, tags) {
  if (!agentId) return '';
  const pills = tags.map((t, i) =>
    `<span class="tag-pill">${esc(t)}<button class="tag-remove" data-tag-idx="${i}" onclick="event.stopPropagation(); removeTag(${i})">&times;</button></span>`
  ).join('');
  return `<div class="tag-editor" id="tagEditor">${pills}<input class="tag-input" id="tagInput" type="text" placeholder="+ 添加标签" data-agent-id="${esc(agentId)}"></div>`;
}

async function renderInbox() {
  if (currentView?.type !== 'inbox') return;
  const address = currentView.address;
  const agentId = currentView.agentId;
  const msgs = await fetchInbox(address);
  const main = document.getElementById('main');

  msgs.forEach(m => { msgCache[m.id] = m; });

  const existingList = main.querySelector('.msg-list');
  if (existingList) {
    existingList.innerHTML = msgs.length === 0
      ? ''
      : msgs.map(m => renderMsgItem(m)).join('');
    const emptyEl = main.querySelector('.inbox-empty');
    if (msgs.length === 0 && !emptyEl) {
      existingList.insertAdjacentHTML('afterend', '<div class="empty inbox-empty">No messages.</div>');
    } else if (msgs.length > 0 && emptyEl) {
      emptyEl.remove();
    }
    hydrateMarkdownBodies(main);
    return;
  }

  const agentData = agentId ? statsData.find(a => a.agent_id === agentId) : null;
  const currentTags = agentData ? (agentData.tags || []) : [];
  const tagEditorHtml = renderTagEditor(agentId, currentTags);

  main.innerHTML = `
    <div class="card">
      <h2>Inbox: ${esc(address)}</h2>
      ${tagEditorHtml}
      <ul class="msg-list">
        ${msgs.map(m => renderMsgItem(m)).join('')}
      </ul>
      ${msgs.length === 0 ? '<div class="empty inbox-empty">No messages.</div>' : ''}
    </div>`;
  hydrateMarkdownBodies(main);
  hydrateTagInput();
}

function renderMsgItem(m) {
  const isExpanded = expandedMsg === m.id;
  const readClass = m.is_read ? 'read' : 'unread';
  const subjText = esc(m.subject) || '(no subject)';
  return `
    <li class="msg-item ${readClass}">
      <div class="msg-item-head" onclick="toggleMsg('${m.id}', event)">
        <div class="msg-header">
          <span class="msg-from">${esc(m.from_agent)}</span>
          <span>
            <span class="msg-action-tag ${m.action}">${m.action}</span>
            <span class="msg-time">${fmtTime(m.created_at)}</span>
          </span>
        </div>
        ${!isExpanded ? `
          <div class="msg-subject${humanSubjectClass(m.from_agent)}">${subjText}</div>
          <div class="msg-preview">${esc(m.body.substring(0, 100))}</div>
        ` : `
          <div class="msg-detail-subject${humanSubjectClass(m.from_agent)}">${subjText}</div>
        `}
      </div>
      ${isExpanded ? renderMsgDetail(m) : ''}
    </li>`;
}

function renderMsgDetail(m) {
  return `
    <div class="msg-detail">
      <div class="meta">From: ${esc(m.from_agent)} &rarr; To: ${esc(m.to_agent)}</div>
      <div class="meta">Action: ${m.action} | Thread: ${m.thread_id.substring(0, 8)}...</div>
      ${m.parent_id ? `<div class="meta">Reply to: ${m.parent_id.substring(0, 8)}...</div>` : ''}
      <div class="msg-body markdown-body" data-md-html="${mdDataAttr(m.body_html)}"></div>
      <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
        <span class="thread-link" data-thread-id="${m.thread_id}" onclick="event.stopPropagation(); showThreadFromInboxLink(this.dataset.threadId)">View full thread</span>
        <span class="thread-link" onclick="replyToMsg('${m.id}', event)">Reply</span>
        <span class="thread-link" onclick="forwardToMsg('${m.id}', event)">Forward</span>
        ${m.is_read ? `<span class="thread-link" onclick="markMsgUnread('${m.id}', event)">Mark as unread</span>` : ''}
        <button type="button" class="btn btn-secondary msg-trash-action" style="font-size:12px;padding:4px 10px"
          onclick="event.stopPropagation(); trashSingleMessage('${m.id}', { fromInbox: true })">Move message to trash</button>
      </div>
    </div>`;
}

async function toggleMsg(msgId, ev) {
  if (ev.target.closest && (ev.target.closest('.thread-link') || ev.target.closest('.msg-trash-action'))) return;
  const expanding = expandedMsg !== msgId;
  expandedMsg = expanding ? msgId : null;
  if (expanding) {
    // auto mark as read
    try {
      await api(`/messages/${encodeURIComponent(msgId)}/read`, { method: 'PATCH' });
      refreshSidebar();
    } catch (e) { /* ignore */ }
  }
  renderInbox();
}

async function showThreadFromInboxLink(threadId) {
  const addr = currentView?.type === 'inbox' ? currentView.address : '';
  await showThread(threadId, addr, null, false);
}

async function showThreadFromSidebar(threadId, context = null) {
  clearNav();
  if (context === 'archive') {
    document.getElementById('navArchive').classList.add('active');
    setSidebarSpecialMode('archive');
  } else if (context === 'trash') {
    document.getElementById('navTrash').classList.add('active');
    setSidebarSpecialMode('trash');
  } else {
    setSidebarSpecialMode('none');
  }
  currentView = {
    type: 'thread',
    threadId,
    fromAddress: '',
    fromThreadSidebar: true,
    fromArchive: context === 'archive',
    fromTrash: context === 'trash',
  };
  await refreshSidebar();
  await renderThreadView();
}

async function showThread(threadId, fromAddress, ev, fromThreadSidebar = false) {
  if (ev) ev.stopPropagation();
  setSidebarSpecialMode('none');
  currentView = {
    type: 'thread',
    threadId,
    fromAddress: fromAddress || '',
    fromThreadSidebar,
    fromArchive: false,
    fromTrash: false,
  };
  await renderThreadView();
}

function buildThreadActionButtons(st) {
  const parts = [];
  if (st.trashed) {
    parts.push('<button type="button" class="btn btn-secondary" id="restoreThreadBtn">Restore</button>');
    parts.push(
      '<button type="button" class="btn btn-secondary" id="purgeThreadBtn" style="background:var(--danger)">Delete permanently</button>',
    );
    return parts.join('');
  }
  if (st.archived) {
    parts.push('<button type="button" class="btn btn-secondary" id="unarchiveThreadBtn">Unarchive</button>');
  } else {
    parts.push('<button type="button" class="btn btn-secondary" id="archiveThreadBtn">Archive thread</button>');
  }
  parts.push(
    '<button type="button" class="btn btn-secondary" id="trashThreadBtn" style="background:#64748b">Move to trash</button>',
  );
  return parts.join('');
}

async function renderThreadView() {
  if (currentView?.type !== 'thread') return;
  const { threadId, fromAddress, fromThreadSidebar, fromArchive, fromTrash } = currentView;
  const msgs = await fetchThread(threadId);
  msgs.forEach(m => { msgCache[m.id] = m; });
  let st = { archived: false, trashed: false };
  try {
    st = await api(`/admin/threads/${encodeURIComponent(threadId)}/status`);
  } catch (e) { /* ignore */ }
  const main = document.getElementById('main');
  let backLabel = '\u2190 Back to inbox';
  if (fromThreadSidebar) {
    if (fromTrash) backLabel = '\u2190 Back to Trash';
    else if (fromArchive) backLabel = '\u2190 Back to Archive';
    else backLabel = '\u2190 Back to thread list';
  }
  const firstSubject = msgs.length > 0 && String(msgs[0].subject || '').trim()
    ? String(msgs[0].subject).trim()
    : '';
  const threadTitle = firstSubject || '(no subject)';
  const actionHtml = buildThreadActionButtons(st);
  main.innerHTML = `
    <button type="button" class="back-btn" id="threadBackBtn">${backLabel}</button>
    <div class="card">
      <h2>${esc(threadTitle)}</h2>
      <div class="thread-actions">${actionHtml}</div>
      ${msgs.map(m => `
        <div class="thread-msg">
          <div class="thread-meta">
            <strong>${esc(m.from_agent)}</strong> &rarr; ${esc(m.to_agent)}
            <span class="msg-action-tag ${m.action}" style="margin-left:6px">${m.action}</span>
            <span style="margin-left:8px;color:var(--muted)">${fmtTime(m.created_at)}</span>
          </div>
          ${m.subject ? `<div class="thread-subject-line${humanSubjectClass(m.from_agent)}">${esc(m.subject)}</div>` : ''}
          <div class="thread-body markdown-body" data-md-html="${mdDataAttr(m.body_html)}"></div>
          ${!st.trashed ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
            <span class="thread-link" onclick="replyToMsg('${m.id}', event)">Reply</span>
            <span class="thread-link" onclick="forwardToMsg('${m.id}', event)">Forward</span>
            ${m.is_read ? `<span class="thread-link" onclick="markMsgUnread('${m.id}', event)">Mark as unread</span>` : ''}
            <button type="button" class="btn btn-secondary" style="font-size:12px;padding:4px 10px" onclick="trashSingleMessage('${m.id}', { fromThread: true })">Move message to trash</button>
          </div>` : ''}
        </div>
      `).join('')}
    </div>`;
  hydrateMarkdownBodies(main);
  document.getElementById('threadBackBtn').onclick = () => {
    if (fromThreadSidebar) threadBackToSidebarList();
    else showInbox(fromAddress);
  };

  const archiveBtn = document.getElementById('archiveThreadBtn');
  if (archiveBtn) {
    archiveBtn.onclick = async () => {
      try {
        await api(`/admin/threads/${encodeURIComponent(threadId)}/archive`, { method: 'POST' });
        if (currentView.fromArchive) await renderThreadView();
        else if (currentView.fromThreadSidebar) threadBackToSidebarList();
        else await showInbox(currentView.fromAddress);
        await refreshSidebar();
      } catch (e) {
        archiveBtn.insertAdjacentText('afterend', ' ' + e.message);
      }
    };
  }
  const unarchiveBtn = document.getElementById('unarchiveThreadBtn');
  if (unarchiveBtn) {
    unarchiveBtn.onclick = async () => {
      try {
        await api(`/admin/threads/${encodeURIComponent(threadId)}/unarchive`, { method: 'POST' });
        if (currentView.fromArchive) {
          currentView = { type: 'archive' };
          document.getElementById('main').innerHTML =
            '<div class="empty">Select an archived thread from the sidebar.</div>';
        }
        await refreshSidebar();
        if (!currentView.fromArchive && currentView.type === 'thread') await renderThreadView();
      } catch (e) {
        unarchiveBtn.insertAdjacentText('afterend', ' ' + e.message);
      }
    };
  }
  const trashBtn = document.getElementById('trashThreadBtn');
  if (trashBtn) {
    trashBtn.onclick = async () => {
      try {
        await api(`/admin/threads/${encodeURIComponent(threadId)}/trash`, { method: 'POST' });
        if (currentView.fromThreadSidebar) threadBackToSidebarList();
        else await showInbox(currentView.fromAddress);
        await refreshSidebar();
      } catch (e) {
        trashBtn.insertAdjacentText('afterend', ' ' + e.message);
      }
    };
  }
  const restoreBtn = document.getElementById('restoreThreadBtn');
  if (restoreBtn) {
    restoreBtn.onclick = async () => {
      try {
        await api(`/admin/threads/${encodeURIComponent(threadId)}/restore`, { method: 'POST' });
        currentView = { type: 'trash' };
        document.getElementById('main').innerHTML =
          '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
        await refreshSidebar();
      } catch (e) {
        restoreBtn.insertAdjacentText('afterend', ' ' + e.message);
      }
    };
  }
  const purgeBtn = document.getElementById('purgeThreadBtn');
  if (purgeBtn) {
    purgeBtn.onclick = async () => {
      if (!await showConfirm('永久删除线程', '确定要永久删除这个线程及其所有消息吗？此操作不可撤销。', '删除')) return;
      try {
        await api(`/admin/threads/${encodeURIComponent(threadId)}/purge`, { method: 'POST' });
        currentView = { type: 'trash' };
        document.getElementById('main').innerHTML =
          '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
        await refreshSidebar();
      } catch (e) {
        purgeBtn.insertAdjacentText('afterend', ' ' + e.message);
      }
    };
  }
}

function threadBackToSidebarList() {
  if (currentView?.fromTrash) {
    currentView = { type: 'trash' };
    document.getElementById('main').innerHTML =
      '<div class="empty">Select a deleted thread or message from the sidebar.</div>';
    void refreshSidebar();
    return;
  }
  if (currentView?.fromArchive) {
    currentView = { type: 'archive' };
    document.getElementById('main').innerHTML =
      '<div class="empty">Select an archived thread from the sidebar.</div>';
    void refreshSidebar();
    return;
  }
  currentView = { type: 'threadList' };
  document.getElementById('main').innerHTML =
    '<div class="empty">Select a thread from the sidebar, or switch to By Agents.</div>';
  void refreshSidebar();
}

async function showCompose(prefillTo, prefillSubject, prefillParentId, originalBody, originalBodyHtml, options) {
  options = options || {};
  const mode = options.mode != null ? options.mode : (prefillParentId ? 'reply' : 'send');
  clearNav();
  setSidebarSpecialMode('none');
  document.getElementById('navCompose').classList.add('active');
  currentView = { type: 'compose' };

  if (agents.length === 0) await fetchAgents();

  let title = 'Compose Message';
  if (mode === 'reply') title = 'Reply';
  else if (mode === 'forward') title = 'Forward';

  const forwardScopeBlock = mode === 'forward' ? `
        <div class="compose-forward-scope">
          <label>Forwarded content</label>
          <p class="compose-forward-hint">Shown after your note. Pick scope for the new recipient.</p>
          <label class="compose-radio-row">
            <input type="radio" name="forwardScope" value="message" checked>
            <span>This message only</span>
          </label>
          <label class="compose-radio-row">
            <input type="radio" name="forwardScope" value="thread">
            <span>Full thread (chronological)</span>
          </label>
        </div>` : '';

  const bodyPlaceholder = mode === 'forward'
    ? 'Optional note (appears above forwarded content)...'
    : 'Write your message...';

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="card">
      <h2>${title}</h2>
      <div class="compose-form">
        <div>
          <label>To</label>
          <select id="composeTo">
            ${agents.map(a => `<option value="${esc(a.address)}" ${a.address === prefillTo ? 'selected' : ''}>${esc(a.name)} (${esc(a.address)})</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Subject</label>
          <input id="composeSubject" type="text" placeholder="Subject..." value="${esc(prefillSubject || '')}">
        </div>
        ${forwardScopeBlock}
        <div>
          <label>Body</label>
          <textarea id="composeBody" placeholder="${esc(bodyPlaceholder)}"></textarea>
        </div>
        ${originalBody ? (originalBodyHtml ? `
        <div>
          <label style="color:var(--muted)">Reference (source message)</label>
          <div class="markdown-body compose-original-md" data-md-html="${mdDataAttr(originalBodyHtml)}"></div>
        </div>` : `
        <div>
          <label style="color:var(--muted)">Reference (source message)</label>
          <div class="compose-original-md" style="white-space:pre-wrap;color:var(--muted)">${esc(originalBody)}</div>
        </div>`) : ''}
        <input type="hidden" id="composeParentId" value="${prefillParentId || ''}">
        <input type="hidden" id="composeMode" value="${esc(mode)}">
        <div style="display:flex;gap:12px;align-items:center">
          <button class="btn btn-primary" id="sendBtn" onclick="doSend()">Send</button>
          <div id="composeStatus"></div>
        </div>
      </div>
    </div>`;
  hydrateMarkdownBodies(main);
}

function replyToMsg(msgId, ev) {
  if (ev) ev.stopPropagation();
  const m = msgCache[msgId];
  if (!m) return;
  const reSubject = m.subject && m.subject.startsWith('Re:') ? m.subject : `Re: ${m.subject || ''}`;
  showCompose(m.from_agent, reSubject, m.id, m.body, m.body_html);
}

async function markMsgUnread(msgId, ev) {
  if (ev) ev.stopPropagation();
  try {
    const updated = await api(`/messages/${encodeURIComponent(msgId)}/unread`, { method: 'PATCH' });
    msgCache[msgId] = { ...msgCache[msgId], ...updated };
    await refreshSidebar();
    if (currentView?.type === 'inbox') await renderInbox();
    if (currentView?.type === 'thread') await renderThreadView();
  } catch (e) {
    alert(e.message);
  }
}

function forwardToMsg(msgId, ev) {
  if (ev) ev.stopPropagation();
  const m = msgCache[msgId];
  if (!m) return;
  const subj = (m.subject || '').trim();
  const fwdSubject = subj && /^fwd:/i.test(subj) ? subj : `Fwd: ${subj || '(no subject)'}`;
  showCompose('', fwdSubject, m.id, m.body, m.body_html, { mode: 'forward' });
}

async function doSend() {
  const btn = document.getElementById('sendBtn');
  const status = document.getElementById('composeStatus');
  btn.disabled = true;
  status.textContent = '';

  const mode = (document.getElementById('composeMode') || {}).value || 'send';
  const parentId = document.getElementById('composeParentId').value;
  const body = {
    to_agent: document.getElementById('composeTo').value,
    subject: document.getElementById('composeSubject').value,
    body: document.getElementById('composeBody').value,
  };
  if (mode === 'forward') {
    body.action = 'forward';
    body.parent_id = parentId;
    const sel = document.querySelector('input[name="forwardScope"]:checked');
    body.forward_scope = sel ? sel.value : 'message';
  } else if (mode === 'reply') {
    body.action = 'reply';
    body.parent_id = parentId;
  } else {
    body.action = 'send';
  }

  try {
    await api('/admin/messages/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    status.className = 'compose-status success';
    status.textContent = 'Message sent!';
    document.getElementById('composeBody').value = '';
    document.getElementById('composeSubject').value = '';
    document.getElementById('composeParentId').value = '';
    await refreshSidebar();
  } catch (e) {
    status.className = 'compose-status error';
    status.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

async function showStats() {
  clearNav();
  setSidebarSpecialMode('none');
  document.getElementById('navStats').classList.add('active');
  currentView = { type: 'stats' };
  await renderStats();
}

async function renderStats() {
  if (currentView?.type !== 'stats') return;
  await fetchStats();
  const main = document.getElementById('main');
  if (statsData.length === 0) {
    main.innerHTML = '<div class="card"><h2>Agent Statistics</h2><div class="empty">No agents registered.</div></div>';
    return;
  }
  main.innerHTML = `
    <div class="card">
      <h2>Agent Statistics</h2>
      <div class="stats-table-wrap">
      <table class="stats-table">
        <thead>
          <tr>
            <th>Name</th><th>Address</th><th>Role</th>
            <th class="stat-num">Received</th><th class="stat-num">Read</th><th class="stat-num">Unread</th>
            <th class="stat-num">Sent</th><th class="stat-num">Replied</th><th class="stat-num">Forwarded</th>
          </tr>
        </thead>
        <tbody>
          ${statsData.map(a => `
            <tr>
              <td><strong>${esc(a.name)}</strong></td>
              <td style="color:var(--muted)">${esc(a.address)}</td>
              <td>${esc(a.role)}</td>
              <td class="stat-num">${a.messages_received}</td>
              <td class="stat-num">${a.messages_read}</td>
              <td class="stat-num" style="color:${a.messages_unread > 0 ? 'var(--danger)' : 'inherit'};font-weight:${a.messages_unread > 0 ? '600' : 'normal'}">${a.messages_unread}</td>
              <td class="stat-num">${a.messages_sent}</td>
              <td class="stat-num">${a.messages_replied}</td>
              <td class="stat-num">${a.messages_forwarded}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>
    </div>`;
}

// --- Polling ---
function startPolling() {
  stopPolling();
  if (pollInterval === 0 || tagEditingActive) return;
  pollTimer = setInterval(async () => {
    await refreshSidebar();
    if (currentView?.type === 'inbox') await renderInbox();
    if (currentView?.type === 'stats') await renderStats();
    if (currentView?.type === 'thread') await renderThreadView();
    if (currentView?.type === 'trashedMessage') await renderTrashedMessageView();
  }, pollInterval);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

document.getElementById('sidebarModeSelect').addEventListener('change', async (e) => {
  sidebarMode = e.target.value;
  clearNav();
  setSidebarSpecialMode('none');
  currentView = null;
  document.getElementById('main').innerHTML =
    '<div class="empty">Select an agent or thread, or open Inbox/Compose / Stats.</div>';
  await refreshSidebar();
});

document.getElementById('pollSelect').addEventListener('change', (e) => {
  pollInterval = parseInt(e.target.value);
  const indicator = document.getElementById('pollIndicator');
  if (pollInterval === 0) {
    indicator.classList.add('paused');
    indicator.title = 'Auto-refresh paused';
    stopPolling();
  } else {
    indicator.classList.remove('paused');
    indicator.title = 'Auto-refresh active';
    startPolling();
  }
});

// --- Helpers ---
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function mdDataAttr(html) {
  if (html == null || html === '') return '';
  return encodeURIComponent(html);
}

function hydrateMarkdownBodies(root) {
  if (!root) return;
  root.querySelectorAll('[data-md-html]').forEach(el => {
    const enc = el.getAttribute('data-md-html');
    el.removeAttribute('data-md-html');
    if (enc == null || enc === '') return;
    try {
      el.innerHTML = decodeURIComponent(enc);
    } catch (err) {
      el.textContent = '(Failed to render message body)';
      return;
    }
    el.querySelectorAll('a[href]').forEach(a => {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
      a.addEventListener('click', e => e.stopPropagation());
    });
  });
}

function fmtTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// --- Confirm modal ---
function showConfirm(title, body, confirmLabel) {
  return new Promise(resolve => {
    const overlay = document.getElementById('confirmModal');
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmBody').textContent = body;
    const okBtn = document.getElementById('confirmOk');
    okBtn.textContent = confirmLabel || '确认';
    overlay.classList.add('visible');

    function cleanup(result) {
      overlay.classList.remove('visible');
      okBtn.removeEventListener('click', onOk);
      document.getElementById('confirmCancel').removeEventListener('click', onCancel);
      overlay.removeEventListener('click', onBackdrop);
      resolve(result);
    }
    function onOk() { cleanup(true); }
    function onCancel() { cleanup(false); }
    function onBackdrop(e) { if (e.target === overlay) cleanup(false); }

    okBtn.addEventListener('click', onOk);
    document.getElementById('confirmCancel').addEventListener('click', onCancel);
    overlay.addEventListener('click', onBackdrop);
  });
}

// --- Delete agent ---
async function deleteAgent(agentId, agentName) {
  const ok = await showConfirm(
    '删除 Agent',
    `确定要删除 Agent "${agentName}" 吗？此操作不可撤销。`,
    '删除',
  );
  if (!ok) return;
  try {
    await api(`/admin/agents/${encodeURIComponent(agentId)}`, { method: 'DELETE' });
    if (currentView?.type === 'inbox') {
      currentView = null;
      document.getElementById('main').innerHTML =
        '<div class="empty">Agent has been deleted.</div>';
    }
    await refreshSidebar();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

// --- Tag editor ---
function refreshTagEditor() {
  const editor = document.getElementById('tagEditor');
  if (!editor) return;
  const agentId = currentView?.agentId;
  if (!agentId) return;
  const entry = statsData.find(a => a.agent_id === agentId);
  const tags = entry ? (entry.tags || []) : [];
  const pills = tags.map((t, i) =>
    `<span class="tag-pill">${esc(t)}<button class="tag-remove" data-tag-idx="${i}" onclick="event.stopPropagation(); removeTag(${i})">&times;</button></span>`
  ).join('');
  const inputVal = document.getElementById('tagInput')?.value || '';
  editor.innerHTML = `${pills}<input class="tag-input" id="tagInput" type="text" placeholder="+ 添加标签" data-agent-id="${esc(agentId)}">`;
  const newInput = document.getElementById('tagInput');
  if (newInput) {
    newInput.value = inputVal;
    hydrateTagInput();
  }
}

async function updateAgentTags(agentId, tags) {
  await api(`/admin/agents/${encodeURIComponent(agentId)}/tags`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tags }),
  });
  const entry = statsData.find(a => a.agent_id === agentId);
  if (entry) entry.tags = tags;
  await refreshSidebar();
}

async function removeTag(idx) {
  const agentId = currentView?.agentId;
  if (!agentId) return;
  const entry = statsData.find(a => a.agent_id === agentId);
  if (!entry) return;
  const tags = [...(entry.tags || [])];
  tags.splice(idx, 1);
  await updateAgentTags(agentId, tags);
  refreshTagEditor();
}

function hydrateTagInput() {
  const input = document.getElementById('tagInput');
  if (!input) return;
  input.addEventListener('focus', () => {
    tagEditingActive = true;
    stopPolling();
  });
  input.addEventListener('blur', () => {
    tagEditingActive = false;
    startPolling();
  });
  input.addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const val = input.value.trim();
    if (!val) return;
    const agentId = currentView?.agentId;
    if (!agentId) return;
    const entry = statsData.find(a => a.agent_id === agentId);
    if (!entry) return;
    const tags = [...(entry.tags || [])];
    if (!tags.includes(val)) {
      tags.push(val);
      await updateAgentTags(agentId, tags);
    }
    input.value = '';
    refreshTagEditor();
  });
}

// --- Mobile sidebar drawer ---
const _sidebar = document.getElementById('sidebar');
const _backdrop = document.getElementById('sidebarBackdrop');
const _hamburger = document.getElementById('hamburgerBtn');

function isMobile() { return window.matchMedia('(max-width: 768px)').matches; }

function openSidebar() {
  _sidebar.classList.add('open');
  _backdrop.classList.add('visible');
}

function closeSidebar() {
  _sidebar.classList.remove('open');
  _backdrop.classList.remove('visible');
}

_hamburger.addEventListener('click', () => {
  _sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
});

_backdrop.addEventListener('click', closeSidebar);

_sidebar.addEventListener('click', (e) => {
  if (isMobile() && e.target.closest('.agent-item')) {
    closeSidebar();
  }
});

document.getElementById('navButtons').addEventListener('click', () => {
  if (isMobile()) closeSidebar();
});

// --- Init ---
(async () => {
  await refreshSidebar();
  startPolling();
})();
</script>
