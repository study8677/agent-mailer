<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Mailer - Operator Console</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<!-- Login / Register Page -->
<div class="login-page" id="loginPage">
  <a href="/" class="login-home-link">&larr; Back to Home</a>
  <div class="login-box">
    <h2>Agent Mailer</h2>
    <p class="login-subtitle" id="loginSubtitle">Operator Console — Sign in to continue</p>

    <!-- Login form -->
    <div id="loginFormWrap">
      <div class="login-form" id="loginForm">
        <div>
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" autocomplete="username">
        </div>
        <div>
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password">
        </div>
        <div id="loginError" class="login-error" style="display:none"></div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      </div>
      <div class="login-toggle">
        Have an invite code? <a onclick="showRegisterForm()">Register</a>
      </div>
    </div>

    <!-- Register form -->
    <div id="registerFormWrap" style="display:none">
      <div class="login-form" id="registerForm">
        <div>
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="username">
        </div>
        <div>
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Choose a password" autocomplete="new-password">
        </div>
        <div>
          <label for="regInviteCode">Invite Code</label>
          <input type="text" id="regInviteCode" placeholder="Enter invite code">
        </div>
        <div id="registerError" class="login-error" style="display:none"></div>
        <button class="login-btn" id="registerBtn" onclick="doRegister()">Create Account</button>
      </div>
      <div class="login-toggle">
        Already have an account? <a onclick="showLoginForm()">Sign in</a>
      </div>
    </div>
  </div>
</div>

<!-- Impersonation banner -->
<div class="impersonate-banner" id="impersonateBanner" style="display:none">
  <span id="impersonateLabel"></span>
  <button onclick="exitImpersonation()">退出模拟</button>
</div>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">&#9776;</button>
    <a href="/" style="text-decoration:none"><h1>AMP<span class="accent">/</span>CONSOLE</h1></a>
  </div>
  <div class="header-right">
    <span class="poll-status" id="pollIndicator" title="Auto-refresh active"></span>
    <label>Refresh:
      <select id="pollSelect">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
        <option value="0">Off</option>
      </select>
    </label>
    <span class="header-user" id="headerUsername"></span>
    <button class="header-logout-btn" id="logoutBtn" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-toolbar" id="sidebarToolbar">
      <label for="sidebarModeSelect" id="sidebarModeLabel">Sidebar</label>
      <select id="sidebarModeSelect" title="List by agents or threads">
        <option value="agents" selected>By Agents</option>
        <option value="threads">By Threads</option>
      </select>
    </div>
    <div class="sidebar-filter-row" id="filterRow">
      <button class="sidebar-filter-btn" id="filterToggleBtn" onclick="openFilterModal()">
        <span class="filter-icon">&#9881;</span> 标签过滤
      </button>
    </div>
<div class="modal-overlay" id="filterModal" onclick="if(event.target===this)closeFilterModal()">
  <div class="filter-modal-box">
    <div class="filter-modal-title">标签过滤</div>
    <div class="filter-modal-tags" id="filterModalTags"></div>
    <div class="filter-modal-actions">
      <button class="modal-cancel" onclick="clearFilterTags()">清除全部</button>
      <button class="btn btn-primary" onclick="closeFilterModal()">确定</button>
    </div>
  </div>
</div>
    <div class="agent-list" id="agentList"></div>
  </div>
  <div class="main" id="main">
    <div class="empty">Select an agent to view inbox, or click Inbox/Compose / Stats.</div>
  </div>
</div>
<div class="nav-buttons" id="navButtons">
  <button class="nav-btn" id="navCompose" onclick="showCompose()">Inbox/Compose</button>
  <button class="nav-btn" id="navStats" onclick="showStats()">Stats</button>
  <button class="nav-btn" id="navArchive" onclick="showArchive()">Archive</button>
  <button class="nav-btn" id="navTrash" onclick="showTrash()">Trash</button>
  <button class="nav-btn" id="navApiKeys" onclick="showApiKeys()">API Keys</button>
  <button class="nav-btn" id="navAdmin" onclick="showAdmin()" style="display:none">Admin</button>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-title" id="confirmTitle"></div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="confirmCancel">取消</button>
      <button class="modal-confirm" id="confirmOk">确认</button>
    </div>
  </div>
</div>

<script>
const BASE = '';
const HUMAN_OPERATOR_ADDRESS = 'human-operator@local';
function humanSubjectClass(fromAgent) {
  return fromAgent === HUMAN_OPERATOR_ADDRESS ? ' msg-subject-human' : '';
}
let agents = [];
let statsData = [];
let threadsData = [];
let trashedMessagesData = [];
let sidebarMode = 'agents';
let currentView = null;
let expandedMsg = null;
let pollTimer = null;
let pollInterval = 5000;
let msgCache = {};
let tagEditingActive = false;
let acIndex = -1;
let filterTags = new Set();
let currentUser = null;
</script>
<script src="/static/js/helpers.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/sidebar.js"></script>
<script src="/static/js/views.js"></script>
<script src="/static/js/tags.js"></script>
<script src="/static/js/events.js"></script>
</body>
</html>
