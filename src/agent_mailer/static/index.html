<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Mailer - Operator Console</title>
<style>
:root {
  --bg: #f5f5f5;
  --sidebar-bg: #1e1e2e;
  --sidebar-text: #cdd6f4;
  --sidebar-hover: #313244;
  --sidebar-active: #45475a;
  --card-bg: #fff;
  --border: #e0e0e0;
  --primary: #7c3aed;
  --primary-light: #ede9fe;
  --danger: #ef4444;
  --success: #22c55e;
  --muted: #6b7280;
  --text: #1f2937;
  --badge-bg: #ef4444;
  --badge-text: #fff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { background: var(--sidebar-bg); color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 18px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.header-right label { color: var(--sidebar-text); }
.header-right select { background: var(--sidebar-hover); color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 6px; font-size: 12px; }
.poll-status { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }
.poll-status.paused { background: var(--muted); }

/* Layout */
.layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 240px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-section { padding: 12px 16px 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.agent-list { flex: 1; overflow-y: auto; }
.agent-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-left: 3px solid transparent; transition: background 0.15s; }
.agent-item:hover { background: var(--sidebar-hover); }
.agent-item.active { background: var(--sidebar-active); border-left-color: var(--primary); }
.agent-item .agent-info { overflow: hidden; }
.agent-item .agent-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-item .agent-role { font-size: 11px; color: var(--muted); }
.badge { background: var(--badge-bg); color: var(--badge-text); font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
.badge.zero { background: var(--muted); opacity: 0.5; }

.nav-buttons { padding: 12px; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid #333; }
.nav-btn { padding: 10px 16px; background: none; border: none; color: var(--sidebar-text); cursor: pointer; text-align: left; font-size: 14px; border-radius: 6px; transition: background 0.15s; }
.nav-btn:hover { background: var(--sidebar-hover); }
.nav-btn.active { background: var(--primary); color: #fff; }

/* Main */
.main { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 16px; margin-bottom: 12px; }

/* Inbox */
.msg-list { list-style: none; }
.msg-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.msg-item:hover { background: #f9fafb; }
.msg-item:last-child { border-bottom: none; }
.msg-item.unread { border-left: 3px solid var(--primary); }
.msg-item.read { border-left: 3px solid transparent; opacity: 0.7; }
.msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.msg-from { font-weight: 600; font-size: 13px; }
.msg-time { font-size: 11px; color: var(--muted); }
.msg-subject { font-size: 14px; margin-bottom: 2px; }
.msg-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-action-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; text-transform: uppercase; }
.msg-action-tag.send { background: #dbeafe; color: #1d4ed8; }
.msg-action-tag.reply { background: #dcfce7; color: #166534; }
.msg-action-tag.forward { background: #fef3c7; color: #92400e; }

/* Message detail */
.msg-detail { background: #f9fafb; border-radius: 6px; padding: 16px; margin-top: 8px; }
.msg-detail .msg-body { white-space: pre-wrap; font-size: 14px; line-height: 1.6; margin: 12px 0; }
.msg-detail .meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.thread-link { font-size: 12px; color: var(--primary); cursor: pointer; text-decoration: underline; }

/* Thread view */
.thread-msg { border-left: 3px solid var(--border); padding: 12px 16px; margin-bottom: 8px; }
.thread-msg .thread-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.thread-msg .thread-body { font-size: 14px; white-space: pre-wrap; line-height: 1.6; }

/* Compose */
.compose-form { display: flex; flex-direction: column; gap: 12px; }
.compose-form label { font-size: 13px; font-weight: 600; }
.compose-form select,
.compose-form input,
.compose-form textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; }
.compose-form textarea { min-height: 200px; resize: vertical; }
.btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #6d28d9; }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
.compose-status { font-size: 13px; padding: 8px; border-radius: 4px; }
.compose-status.success { background: #dcfce7; color: #166534; }
.compose-status.error { background: #fee2e2; color: #991b1b; }

/* Stats */
.stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.stats-table th { text-align: left; padding: 8px 12px; background: #f3f4f6; border-bottom: 2px solid var(--border); font-weight: 600; }
.stats-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.stats-table tr:hover td { background: #f9fafb; }
.stat-num { font-variant-numeric: tabular-nums; text-align: right; }

/* Back button */
.back-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 13px; margin-bottom: 12px; padding: 0; }
.back-btn:hover { text-decoration: underline; }

/* Empty state */
.empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>Agent Mailer &mdash; Operator Console</h1>
  <div class="header-right">
    <span class="poll-status" id="pollIndicator" title="Auto-refresh active"></span>
    <label>Refresh:
      <select id="pollSelect">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
        <option value="0">Off</option>
      </select>
    </label>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">Agents</div>
    <div class="agent-list" id="agentList"></div>
    <div class="nav-buttons">
      <button class="nav-btn" id="navCompose" onclick="showCompose()">Compose</button>
      <button class="nav-btn" id="navStats" onclick="showStats()">Stats</button>
    </div>
  </div>
  <div class="main" id="main">
    <div class="empty">Select an agent to view inbox, or click Compose / Stats.</div>
  </div>
</div>

<script>
const BASE = '';
let agents = [];
let statsData = [];
let currentView = null; // {type: 'inbox', address} | {type: 'compose'} | {type: 'stats'} | {type: 'thread', threadId, fromAddress}
let expandedMsg = null;
let pollTimer = null;
let pollInterval = 5000;
let msgCache = {}; // id -> message object

// --- API helpers ---
async function api(path, opts) {
  const resp = await fetch(BASE + path, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || resp.statusText);
  }
  return resp.json();
}

// --- Data fetching ---
async function fetchStats() {
  statsData = await api('/admin/agents/stats');
  return statsData;
}

async function fetchAgents() {
  agents = await api('/agents');
  return agents;
}

async function fetchInbox(address) {
  return api(`/admin/messages/inbox/${encodeURIComponent(address)}?all=true`);
}

async function fetchThread(threadId) {
  return api(`/messages/thread/${encodeURIComponent(threadId)}`);
}

// --- Sidebar ---
async function refreshSidebar() {
  await fetchStats();
  const list = document.getElementById('agentList');
  const activeAddr = currentView?.type === 'inbox' ? currentView.address : null;
  list.innerHTML = statsData.map(a => `
    <div class="agent-item ${a.address === activeAddr ? 'active' : ''}"
         onclick="showInbox('${a.address}')">
      <div class="agent-info">
        <div class="agent-name">${esc(a.name)}</div>
        <div class="agent-role">${esc(a.role)} &middot; ${esc(a.address)}</div>
      </div>
      <span class="badge ${a.messages_unread === 0 ? 'zero' : ''}">${a.messages_unread}</span>
    </div>
  `).join('');
}

// --- Views ---
function clearNav() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.agent-item').forEach(b => b.classList.remove('active'));
  expandedMsg = null;
}

async function showInbox(address) {
  clearNav();
  currentView = { type: 'inbox', address };
  document.querySelectorAll('.agent-item').forEach(el => {
    if (el.querySelector('.agent-role')?.textContent.includes(address)) el.classList.add('active');
  });
  await renderInbox();
}

async function renderInbox() {
  if (currentView?.type !== 'inbox') return;
  const address = currentView.address;
  const msgs = await fetchInbox(address);
  const main = document.getElementById('main');

  if (msgs.length === 0) {
    main.innerHTML = `<div class="card"><h2>Inbox: ${esc(address)}</h2><div class="empty">No messages.</div></div>`;
    return;
  }

  msgs.forEach(m => msgCache[m.id] = m);
  main.innerHTML = `
    <div class="card">
      <h2>Inbox: ${esc(address)}</h2>
      <ul class="msg-list">
        ${msgs.map(m => renderMsgItem(m)).join('')}
      </ul>
    </div>`;
}

function renderMsgItem(m) {
  const isExpanded = expandedMsg === m.id;
  const readClass = m.is_read ? 'read' : 'unread';
  return `
    <li class="msg-item ${readClass}" onclick="toggleMsg('${m.id}', event)">
      <div class="msg-header">
        <span class="msg-from">${esc(m.from_agent)}</span>
        <span>
          <span class="msg-action-tag ${m.action}">${m.action}</span>
          <span class="msg-time">${fmtTime(m.created_at)}</span>
        </span>
      </div>
      <div class="msg-subject">${esc(m.subject) || '(no subject)'}</div>
      ${!isExpanded ? `<div class="msg-preview">${esc(m.body.substring(0, 100))}</div>` : ''}
      ${isExpanded ? renderMsgDetail(m) : ''}
    </li>`;
}

function renderMsgDetail(m) {
  return `
    <div class="msg-detail">
      <div class="meta">From: ${esc(m.from_agent)} &rarr; To: ${esc(m.to_agent)}</div>
      <div class="meta">Action: ${m.action} | Thread: ${m.thread_id.substring(0, 8)}...</div>
      ${m.parent_id ? `<div class="meta">Reply to: ${m.parent_id.substring(0, 8)}...</div>` : ''}
      <div class="msg-body">${esc(m.body)}</div>
      <span class="thread-link" onclick="showThread('${m.thread_id}', '${currentView?.address || ''}', event)">View full thread</span>
      <span style="margin-left:12px" class="thread-link" onclick="replyToMsg('${m.id}', event)">Reply</span>
    </div>`;
}

async function toggleMsg(msgId, ev) {
  if (ev.target.classList.contains('thread-link')) return;
  const expanding = expandedMsg !== msgId;
  expandedMsg = expanding ? msgId : null;
  if (expanding) {
    // auto mark as read
    try {
      await api(`/messages/${encodeURIComponent(msgId)}/read`, { method: 'PATCH' });
      refreshSidebar();
    } catch (e) { /* ignore */ }
  }
  renderInbox();
}

async function showThread(threadId, fromAddress, ev) {
  if (ev) ev.stopPropagation();
  currentView = { type: 'thread', threadId, fromAddress };
  const msgs = await fetchThread(threadId);
  const main = document.getElementById('main');
  main.innerHTML = `
    <button class="back-btn" onclick="showInbox('${fromAddress}')">&larr; Back to inbox</button>
    <div class="card">
      <h2>Thread ${threadId.substring(0, 8)}...</h2>
      ${msgs.map(m => `
        <div class="thread-msg">
          <div class="thread-meta">
            <strong>${esc(m.from_agent)}</strong> &rarr; ${esc(m.to_agent)}
            <span class="msg-action-tag ${m.action}" style="margin-left:6px">${m.action}</span>
            <span style="margin-left:8px;color:var(--muted)">${fmtTime(m.created_at)}</span>
          </div>
          ${m.subject ? `<div style="font-weight:500;margin:4px 0">${esc(m.subject)}</div>` : ''}
          <div class="thread-body">${esc(m.body)}</div>
        </div>
      `).join('')}
    </div>`;
}

async function showCompose(prefillTo, prefillSubject, prefillParentId, originalBody) {
  clearNav();
  document.getElementById('navCompose').classList.add('active');
  currentView = { type: 'compose' };

  if (agents.length === 0) await fetchAgents();

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="card">
      <h2>${prefillParentId ? 'Reply' : 'Compose Message'}</h2>
      <div class="compose-form">
        <div>
          <label>To</label>
          <select id="composeTo">
            ${agents.map(a => `<option value="${esc(a.address)}" ${a.address === prefillTo ? 'selected' : ''}>${esc(a.name)} (${esc(a.address)})</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Subject</label>
          <input id="composeSubject" type="text" placeholder="Subject..." value="${esc(prefillSubject || '')}">
        </div>
        <div>
          <label>Body</label>
          <textarea id="composeBody" placeholder="Write your message..."></textarea>
        </div>
        ${originalBody ? `
        <div>
          <label style="color:var(--muted)">Original Message</label>
          <div style="background:#f3f4f6;border-left:3px solid var(--primary);padding:12px 16px;border-radius:4px;font-size:13px;white-space:pre-wrap;color:var(--muted);max-height:300px;overflow-y:auto">${esc(originalBody)}</div>
        </div>` : ''}
        <input type="hidden" id="composeParentId" value="${prefillParentId || ''}">
        <div style="display:flex;gap:12px;align-items:center">
          <button class="btn btn-primary" id="sendBtn" onclick="doSend()">Send</button>
          <div id="composeStatus"></div>
        </div>
      </div>
    </div>`;
}

function replyToMsg(msgId, ev) {
  if (ev) ev.stopPropagation();
  const m = msgCache[msgId];
  if (!m) return;
  const reSubject = m.subject && m.subject.startsWith('Re:') ? m.subject : `Re: ${m.subject || ''}`;
  showCompose(m.from_agent, reSubject, m.id, m.body);
}

async function doSend() {
  const btn = document.getElementById('sendBtn');
  const status = document.getElementById('composeStatus');
  btn.disabled = true;
  status.textContent = '';

  const body = {
    to_agent: document.getElementById('composeTo').value,
    subject: document.getElementById('composeSubject').value,
    body: document.getElementById('composeBody').value,
    action: document.getElementById('composeParentId').value ? 'reply' : 'send',
  };
  const parentId = document.getElementById('composeParentId').value;
  if (parentId) body.parent_id = parentId;

  try {
    await api('/admin/messages/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    status.className = 'compose-status success';
    status.textContent = 'Message sent!';
    document.getElementById('composeBody').value = '';
    document.getElementById('composeSubject').value = '';
    document.getElementById('composeParentId').value = '';
    await refreshSidebar();
  } catch (e) {
    status.className = 'compose-status error';
    status.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

async function showStats() {
  clearNav();
  document.getElementById('navStats').classList.add('active');
  currentView = { type: 'stats' };
  await renderStats();
}

async function renderStats() {
  if (currentView?.type !== 'stats') return;
  await fetchStats();
  const main = document.getElementById('main');
  if (statsData.length === 0) {
    main.innerHTML = '<div class="card"><h2>Agent Statistics</h2><div class="empty">No agents registered.</div></div>';
    return;
  }
  main.innerHTML = `
    <div class="card">
      <h2>Agent Statistics</h2>
      <table class="stats-table">
        <thead>
          <tr>
            <th>Name</th><th>Address</th><th>Role</th>
            <th class="stat-num">Received</th><th class="stat-num">Read</th><th class="stat-num">Unread</th>
            <th class="stat-num">Sent</th><th class="stat-num">Replied</th><th class="stat-num">Forwarded</th>
          </tr>
        </thead>
        <tbody>
          ${statsData.map(a => `
            <tr>
              <td><strong>${esc(a.name)}</strong></td>
              <td style="color:var(--muted)">${esc(a.address)}</td>
              <td>${esc(a.role)}</td>
              <td class="stat-num">${a.messages_received}</td>
              <td class="stat-num">${a.messages_read}</td>
              <td class="stat-num" style="color:${a.messages_unread > 0 ? 'var(--danger)' : 'inherit'};font-weight:${a.messages_unread > 0 ? '600' : 'normal'}">${a.messages_unread}</td>
              <td class="stat-num">${a.messages_sent}</td>
              <td class="stat-num">${a.messages_replied}</td>
              <td class="stat-num">${a.messages_forwarded}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
}

// --- Polling ---
function startPolling() {
  stopPolling();
  if (pollInterval === 0) return;
  pollTimer = setInterval(async () => {
    await refreshSidebar();
    if (currentView?.type === 'inbox') await renderInbox();
    if (currentView?.type === 'stats') await renderStats();
  }, pollInterval);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

document.getElementById('pollSelect').addEventListener('change', (e) => {
  pollInterval = parseInt(e.target.value);
  const indicator = document.getElementById('pollIndicator');
  if (pollInterval === 0) {
    indicator.classList.add('paused');
    indicator.title = 'Auto-refresh paused';
    stopPolling();
  } else {
    indicator.classList.remove('paused');
    indicator.title = 'Auto-refresh active';
    startPolling();
  }
});

// --- Helpers ---
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function fmtTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// --- Init ---
(async () => {
  await refreshSidebar();
  startPolling();
})();
</script>
</body>
</html>
