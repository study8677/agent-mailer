<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Mailer - Operator Console</title>
<link rel="stylesheet" href="/static/styles.css?v=18">
</head>
<body>

<!-- Login / Register Page -->
<div class="login-page" id="loginPage">
  <a href="/" class="login-home-link">&larr; Back to Home</a>
  <div class="login-box">
    <h2>Agent Mailer</h2>
    <p class="login-subtitle" id="loginSubtitle">Operator Console — Sign in to continue</p>

    <!-- Login form -->
    <div id="loginFormWrap">
      <div class="login-form" id="loginForm">
        <div>
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" autocomplete="username">
        </div>
        <div>
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password">
        </div>
        <div id="loginError" class="login-error" style="display:none"></div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      </div>
      <div class="login-toggle">
        Have an invite code? <a onclick="showRegisterForm()">Register</a>
      </div>
    </div>

    <!-- Register form -->
    <div id="registerFormWrap" style="display:none">
      <div class="login-form" id="registerForm">
        <div>
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="username">
        </div>
        <div>
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Choose a password" autocomplete="new-password">
        </div>
        <div>
          <label for="regInviteCode">Invite Code</label>
          <input type="text" id="regInviteCode" placeholder="Enter invite code">
        </div>
        <div id="registerError" class="login-error" style="display:none"></div>
        <button class="login-btn" id="registerBtn" onclick="doRegister()">Create Account</button>
      </div>
      <div class="login-toggle">
        Already have an account? <a onclick="showLoginForm()">Sign in</a>
      </div>
    </div>
  </div>
</div>

<!-- Impersonation banner -->
<div class="impersonate-banner" id="impersonateBanner" style="display:none">
  <span id="impersonateLabel"></span>
  <button onclick="exitImpersonation()">退出模拟</button>
</div>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">&#9776;</button>
    <a href="/" style="text-decoration:none"><h1>AMP<span class="accent">/</span>CONSOLE</h1></a>
  </div>
  <div class="header-right">
    <span class="poll-status" id="pollIndicator" title="Auto-refresh active"></span>
    <label>Refresh:
      <select id="pollSelect">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
        <option value="0">Off</option>
      </select>
    </label>
    <span class="header-user" id="headerUsername"></span>
    <button class="header-logout-btn" id="logoutBtn" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-toolbar" id="sidebarToolbar">
      <label for="sidebarModeSelect" id="sidebarModeLabel">Sidebar</label>
      <select id="sidebarModeSelect" title="List by agents or threads">
        <option value="agents" selected>By Agents</option>
        <option value="threads">By Threads</option>
        <option value="teams">By Teams</option>
      </select>
    </div>
    <div class="sidebar-filter-row" id="filterRow">
      <button class="sidebar-filter-btn" id="filterToggleBtn" onclick="openFilterModal()">
        <span class="filter-icon">&#9881;</span> 标签过滤
      </button>
    </div>
<div class="modal-overlay" id="filterModal" onclick="if(event.target===this)closeFilterModal()">
  <div class="filter-modal-box">
    <div class="filter-modal-title">标签过滤</div>
    <div class="filter-modal-tags" id="filterModalTags"></div>
    <div class="filter-modal-actions">
      <button class="modal-cancel" onclick="clearFilterTags()">清除全部</button>
      <button class="btn btn-primary" onclick="closeFilterModal()">确定</button>
    </div>
  </div>
</div>
    <div class="agent-list" id="agentList"></div>
  </div>
  <div class="main" id="main">
    <div class="empty">Select an agent to view inbox, or click Inbox/Compose / Stats.</div>
  </div>
</div>
<div class="nav-buttons" id="navButtons">
  <button class="nav-toggle" id="navToggle" onclick="toggleNavPanel()" title="Toggle panel">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <button class="nav-btn" id="navInbox" onclick="showHumanInbox()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Inbox</button>
  <button class="nav-btn" id="navCompose" onclick="showCompose()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Compose</button>
  <button class="nav-btn" id="navStats" onclick="showStats()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Stats</button>
  <button class="nav-btn" id="navTeams" onclick="showTeams()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Teams</button>
  <button class="nav-btn" id="navArchive" onclick="showArchive()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Archive</button>
  <button class="nav-btn" id="navTrash" onclick="showTrash()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Trash</button>
  <button class="nav-btn" id="navApiKeys" onclick="showApiKeys()"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>API Keys</button>
  <button class="nav-btn" id="navAdmin" onclick="showAdmin()" style="display:none"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Admin</button>
</div>

<div class="modal-overlay" id="composeModal">
  <div class="compose-modal-box">
    <button class="compose-modal-close" onclick="closeComposeModal()">&times;</button>
    <div id="composeModalContent"></div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-title" id="confirmTitle"></div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="confirmCancel">取消</button>
      <button class="modal-confirm" id="confirmOk">确认</button>
    </div>
  </div>
</div>

<script>
const BASE = '';
let HUMAN_OPERATOR_ADDRESS = '';
let HUMAN_OPERATOR_AGENT_ID = '';
function humanSubjectClass(fromAgent) {
  return HUMAN_OPERATOR_ADDRESS && fromAgent === HUMAN_OPERATOR_ADDRESS ? ' msg-subject-human' : '';
}
let agents = [];
let statsData = [];
let threadsData = [];
let trashedMessagesData = [];
let sidebarMode = 'agents';
let currentView = null;
let expandedMsg = null;
let pollTimer = null;
let pollInterval = 5000;
let msgCache = {};
let tagEditingActive = false;
let acIndex = -1;
let filterTags = new Set();
let currentUser = null;
</script>
<script src="/static/js/helpers.js?v=18"></script>
<script src="/static/js/api.js?v=18"></script>
<script src="/static/js/auth.js?v=18"></script>
<script src="/static/js/sidebar.js?v=18"></script>
<script src="/static/js/views.js?v=18"></script>
<script src="/static/js/teams.js?v=18"></script>
<script src="/static/js/tags.js?v=18"></script>
<script src="/static/js/events.js?v=18"></script>
</body>
</html>
